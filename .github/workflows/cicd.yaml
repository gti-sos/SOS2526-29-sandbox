name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend-group
        run: npm install

      - name: Run LCC API v2 tests
        run: npm run test-LCC-v2

      - name: Build frontend for LCC
        working-directory: frontend-group
        run: npm exec vite build -- --configLoader native

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run LCC e2e tests
        run: npm run test-LCC-e2e
